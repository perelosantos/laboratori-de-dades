<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figueres · Nits càlides 1980–2025</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; background: #fff; color: #0b0b0b; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: #52514e; margin-bottom: 8px; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .meta { font-size: 12px; color: #898781; margin-top: .5rem; }
  h2 { font-size: 15px; font-weight: 500; margin: 0 0 .75rem; }
</style>
</head>
<body>
<h2>Nits càlides · Figueres/Cabanes · 1980–2025</h2>
<div class="legend">
  <span><span class="swatch" style="background:#2a78d6"></span>Nits tropicals (TN ≥ 20°C)</span>
  <span><span class="swatch" style="background:#e34948"></span>Nits tòrrides (TN ≥ 25°C)</span>
</div>
<div style="position:relative;width:100%;height:300px;">
  <canvas id="chart" role="img" aria-label="Nits tropicals i tòrrides Figueres 1980-2025"></canvas>
</div>
<p class="meta">Només 1 nit tòrrida registrada (2022). La tramuntana refreda les nits malgrat els màxims diürns extrems.</p>
<script>
const tropData={1980:3,1981:7,1982:4,1983:6,1986:2,1987:1,1988:1,1989:4,1990:2,1991:10,1992:6,1993:3,1994:11,1995:9,1996:3,1997:5,1998:12,1999:9,2000:7,2001:9,2002:6,2003:13,2004:6,2005:6,2006:12,2007:2,2008:4,2009:7,2010:11,2011:4,2012:9,2013:8,2014:4,2015:8,2016:14,2017:14,2018:21,2019:11,2020:12,2021:14,2022:26,2023:32,2024:29,2025:31};
const torrData={2022:1};
const years=[];for(let y=1980;y<=2025;y++)years.push(y);
new Chart(document.getElementById('chart'),{type:'bar',data:{labels:years,datasets:[
  {label:'Nits tropicals',data:years.map(y=>tropData[y]||0),backgroundColor:'rgba(42,120,214,0.75)',borderRadius:2,borderSkipped:false},
  {label:'Nits tòrrides',data:years.map(y=>torrData[y]||0),backgroundColor:'#e34948',borderRadius:2,borderSkipped:false}
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y}}},scales:{x:{ticks:{color:'#898781',maxTicksLimit:16,maxRotation:45},grid:{display:false}},y:{ticks:{color:'#898781'},grid:{color:'rgba(180,178,169,0.2)'},title:{display:true,text:'Nits / any',color:'#898781',font:{size:11}}}}}});
</script>
</body>
</html>
