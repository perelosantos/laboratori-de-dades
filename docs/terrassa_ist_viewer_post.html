    return istColor(feature.properties.ist);
  } else { // diff
    const orig = feature.properties.zone_code;
    const nw = newZones[cusec];
    if (!nw) return '#555';
    return orig === nw ? DIFF_SAME : DIFF_CHANGED;
  }
}

function getOpacity(feature) {
  if (mode === 'diff') {
    const orig = feature.properties.zone_code;
    const nw = newZones[feature.properties.cusec];
    return orig === nw ? 0.2 : 0.75;
  }
  return 0.65;
}

const tooltip = document.getElementById('tooltip');


let schoolLayer = null;
let showSchools = true;

function toggleSchools() {
  showSchools = document.getElementById('toggle-schools').checked;
  renderSchools();
}

function renderSchools() {
  if (schoolLayer) map.removeLayer(schoolLayer);
  if (!showSchools) return;
  schoolLayer = L.layerGroup();
  SCHOOLS.forEach(s => {
    const isPublic = s.naturalesa === 'Públic';
    const tip = `<strong>${s.name}</strong>${s.cmc ? ' <span style="color:#ffaa00">&#9733; CMC</span>' : ''}<br>${s.tipus} · ${s.naturalesa}<br>Zona: ${ZONE_LABELS[s.zone] || s.zone}<br>IST: ${s.ist !== null ? s.ist : '—'}`;

    if (s.cmc) {
      const outer = L.circleMarker([s.lat, s.lon], {
        radius: 9, fillColor: '#4a90d9', fillOpacity: 0.95,
        color: '#ffffff', weight: 2, opacity: 1
      });
      const inner = L.circleMarker([s.lat, s.lon], {
        radius: 3, fillColor: '#ffffff', fillOpacity: 1,
        color: 'transparent', weight: 0
      });
      outer.bindTooltip(tip, {direction: 'top', offset: [0, -10]});
      schoolLayer.addLayer(outer);
      schoolLayer.addLayer(inner);
    } else {
      const marker = L.circleMarker([s.lat, s.lon], {
        radius: 7,
        fillColor: isPublic ? '#4a90d9' : '#e8872a',
        fillOpacity: 0.95,
        color: isPublic ? '#4a90d9' : '#e8872a',
        weight: 1, opacity: 1
      });
      marker.bindTooltip(tip, {direction: 'top', offset: [0, -8]});
      schoolLayer.addLayer(marker);
    }
  });
  schoolLayer.addTo(map);
}

function renderMap() {
  if (geoLayer) map.removeLayer(geoLayer);
  geoLayer = L.geoJSON(GEOJSON, {
    style: (feature) => ({
      fillColor: getColor(feature),
      fillOpacity: getOpacity(feature),
      color: '#fff',
      weight: 0.8,
      opacity: 0.5
    }),
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.on('mousemove', (e) => {
        const newZone = newZones[p.cusec];
        const orig = ZONE_LABELS[p.zone_code] || p.zone_code;
        const nw = ZONE_LABELS[newZone] || newZone || '—';
        const changed = newZone && newZone !== p.zone_code;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.originalEvent.pageX + 12) + 'px';
        tooltip.style.top = (e.originalEvent.pageY - 20) + 'px';
        tooltip.innerHTML = `
          <strong>${p.cusec}</strong><br>
          ${p.barri ? p.barri + '<br>' : ''}${p.cusec}<br>IST 2024: <strong>${p.ist !== null ? p.ist : '—'}</strong><br>
          Original: <span style="color:${ZONE_COLORS[p.zone_code]}">${orig}</span><br>
          ${newZone ? `Nova: <span style="color:${ZONE_COLORS[newZone] || '#aaa'}">${nw}</span>${changed ? ' ⚡' : ' ✓'}` : ''}
        `;
      });
      layer.on('mouseout', () => { tooltip.style.display = 'none'; });
    }
  }).addTo(map);
  updateLegend();
}

function updateLegend() {
  const legend = document.getElementById('legend');
  if (mode === 'diff') {
    legend.innerHTML = `
      <div class="legend-item"><div class="legend-swatch" style="background:${DIFF_CHANGED}"></div>Canvi de zona</div>
      <div class="legend-item"><div class="legend-swatch" style="background:${DIFF_SAME};opacity:0.5"></div>Sense canvi</div>
    `;
  } else {
    legend.innerHTML = [
      ['< 60','#b22222'],['60–75','#e05c00'],['75–90','#f0a500'],
      ['90–100','#d4c84a'],['100–110','#8ab55a'],['110–120','#4a9a4a'],['> 120','#1a7a1a']
    ].map(([label,color]) =>
      `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>IST ${label}</div>`
    ).join('');
  }
}

function showMode(m) {
  mode = m;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  renderMap();
}

function loadCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const lines = e.target.result.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim());
    const cusecIdx = headers.findIndex(h => h.toUpperCase() === 'CUSEC');
    const zoneIdx = headers.findIndex(h => h.toUpperCase() === 'ZONE_FINAL' || h.toUpperCase() === 'ZONE' || h.toUpperCase().includes('ZONA'));
    if (cusecIdx < 0 || zoneIdx < 0) {
      alert('CSV ha de tenir columnes CUSEC i ZONE (o zona/zone_code)');
      return;
    }
    newZones = {};
    let count = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length > Math.max(cusecIdx, zoneIdx)) {
        const cusec = cols[cusecIdx].trim();
        const zone = cols[zoneIdx].trim();
        if (cusec && zone) { newZones[cusec] = zone; count++; }
      }
    }
    document.getElementById('btn-new').disabled = false;
    document.getElementById('btn-diff').disabled = false;
    const changed = Object.entries(newZones).filter(([c,z]) => {
      const orig = GEOJSON.features.find(f => f.properties.cusec === c);
      return orig && orig.properties.zone_code !== z;
    }).length;
    document.getElementById('status').textContent = `${count} seccions carregades · ${changed} canvis detectats`;
    showMode('diff');
  };
  reader.readAsText(file);
}

// Drag-drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', (e) => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) { document.getElementById('file-input').files = e.dataTransfer.files; loadCSV({target: {files: [file]}}); }
});

renderMap();
renderSchools();
</script>
</body>
</html>
