<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figueres · Temperatura màxima anual 1980–2025</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; background: #fff; color: #0b0b0b; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: #52514e; margin-bottom: 8px; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .dash { width: 14px; height: 2px; display: inline-block; }
  .meta { font-size: 12px; color: #898781; margin-top: .5rem; }
  h2 { font-size: 15px; font-weight: 500; margin: 0 0 .75rem; }
</style>
</head>
<body>
<h2>Temperatura màxima anual · Figueres/Cabanes · 1980–2025</h2>
<div class="legend">
  <span><span class="swatch" style="background:#2a78d6"></span>TX màxima anual</span>
  <span><span class="dash" style="background:#888780;border-top:2px dashed #888780"></span>Tendència lineal</span>
  <span><span class="dash" style="background:#e34948;border-top:2px dashed #e34948"></span>Tendència per trams (tall 1988)</span>
</div>
<div style="position:relative;width:100%;height:320px;">
  <canvas id="chart" role="img" aria-label="Temperatura màxima anual Figueres 1980-2025"></canvas>
</div>
<p class="meta" id="stats"></p>
<script>
const data={1980:34.4,1981:36.6,1982:37.5,1983:37.4,1984:34.9,1985:35.0,1986:37.7,1987:38.5,1988:35.2,1989:35.0,1990:36.3,1991:36.2,1992:35.1,1993:37.1,1994:37.1,1995:37.1,1996:35.1,1997:33.9,1998:37.9,1999:36.8,2000:36.8,2001:37.1,2002:34.7,2003:40.6,2004:35.9,2005:36.5,2006:39.5,2007:35.6,2008:37.1,2009:38.5,2010:39.9,2011:36.0,2012:35.9,2013:36.0,2014:36.9,2015:37.1,2016:38.1,2017:37.5,2018:40.3,2019:38.7,2020:37.9,2021:39.5,2022:40.8,2023:45.0,2024:43.2,2025:40.9};
const years=Object.keys(data).map(Number).sort();
const vals=years.map(y=>data[y]);
const allX=[...years];for(let y=2026;y<=2035;y++)allX.push(y);
function lr(xs,ys){const n=xs.length,mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;const s=xs.reduce((a,x,i)=>a+(x-mx)*(ys[i]-my),0)/xs.reduce((a,x)=>a+(x-mx)**2,0);return{s,b:my-s*mx};}
const BREAK=1988;
const rAll=lr(years,vals);
const y1=years.filter(y=>y<=BREAK),v1=y1.map(y=>data[y]);
const y2=years.filter(y=>y>BREAK),v2=y2.map(y=>data[y]);
const r1=lr(y1,v1),r2=lr(y2,v2);
const pw=allX.map(y=>y<=BREAK?+(r1.s*y+r1.b).toFixed(2):+(r2.s*y+r2.b).toFixed(2));
document.getElementById('stats').textContent='Lineal: +'+(rAll.s*10).toFixed(2)+' °C/dec → 2035: '+(rAll.s*2035+rAll.b).toFixed(1)+' °C   |   Per trams post-1988: +'+(r2.s*10).toFixed(2)+' °C/dec → 2035: '+(r2.s*2035+r2.b).toFixed(1)+' °C';
new Chart(document.getElementById('chart'),{type:'line',data:{labels:allX,datasets:[
  {label:'TX màxima',data:years.map((y,i)=>({x:y,y:vals[i]})),borderColor:'#2a78d6',backgroundColor:'rgba(42,120,214,0.07)',borderWidth:2,pointRadius:3,pointHoverRadius:5,tension:0.2,fill:true},
  {label:'Lineal',data:allX.map(y=>({x:y,y:+(rAll.s*y+rAll.b).toFixed(2)})),borderColor:'#888780',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false},
  {label:'Per trams',data:allX.map((y,i)=>({x:y,y:pw[i]})),borderColor:'#e34948',borderWidth:2,borderDash:[6,2],pointRadius:0,fill:false}
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y.toFixed(1)+' °C'}}},scales:{x:{type:'linear',min:1980,max:2035,ticks:{color:'#898781',stepSize:5,maxRotation:45},grid:{color:'rgba(180,178,169,0.2)'}},y:{min:32,ticks:{color:'#898781',callback:v=>v+'°'},grid:{color:'rgba(180,178,169,0.2)'},title:{display:true,text:'°C',color:'#898781',font:{size:11}}}}}});
</script>
</body>
</html>
