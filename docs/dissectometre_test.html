<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dissectòmetre · Test de càrrega</title>
<style>
:root{--bg:#0f1117;--bg2:#181b24;--bg3:#1e2230;--bd:#2a2f3f;--ac:#4fd1c5;--tx:#e2e8f0;--tx2:#8892a4;--tx3:#4a5568;--mono:"IBM Plex Mono",monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--mono);min-height:100vh;padding:24px;}
h1{font-size:13px;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;}
.row{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
label{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;}
select{background:var(--bg2);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:4px;font-family:var(--mono);font-size:11px;min-width:220px;}
select:focus{outline:none;border-color:var(--ac);}
.status{font-size:11px;color:var(--tx2);padding:8px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;margin-bottom:16px;}
.status.ok{border-color:var(--ac);color:var(--ac);}
.status.err{border-color:#fc8181;color:#fc8181;}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:16px;margin-bottom:12px;font-size:11px;line-height:1.8;}
.card-t{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);margin-bottom:10px;}
.kv{display:flex;justify-content:space-between;border-bottom:1px solid var(--bg3);padding:3px 0;}
.kv:last-child{border-bottom:none;}
.kv-l{color:var(--tx2);}
.kv-v{color:var(--tx);}
</style>
</head>
<body>
<h1>⬡ Dissectòmetre · Test de càrrega</h1>

<div id="status" class="status">Carregant municipis…</div>

<div class="row">
  <label>Municipi</label>
  <select id="sel-muni" disabled>
    <option>—</option>
  </select>
</div>

<div class="row">
  <label>Secció censal</label>
  <select id="sel-sec" disabled>
    <option>—</option>
  </select>
</div>

<div id="preview"></div>

<script>
const BASE = 'https://raw.githubusercontent.com/perelosantos/laboratori-de-dades/main/data/';
let DATA = [];

async function init() {
  const status = document.getElementById('status');
  try {
    const res = await fetch(BASE + 'index.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const index = await res.json();
    status.textContent = `✓ index.json carregat · ${index.length} municipi(s) disponible(s)`;
    status.className = 'status ok';
    populateMunis(index);
  } catch(e) {
    status.textContent = `✗ No s'ha pogut carregar index.json · ${e.message}`;
    status.className = 'status err';
  }
}

function populateMunis(index) {
  const sel = document.getElementById('sel-muni');
  sel.innerHTML = '<option value="">— Selecciona municipi —</option>';
  index.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.file;
    opt.textContent = `${m.nom} (${m.seccions} seccions · ${m.any_dades})`;
    opt.dataset.nom = m.nom;
    sel.appendChild(opt);
  });
  sel.disabled = false;
  sel.addEventListener('change', () => loadMuni(sel.value, sel.options[sel.selectedIndex].dataset.nom));
}

async function loadMuni(file, nom) {
  if (!file) return;
  const status = document.getElementById('status');
  const selSec = document.getElementById('sel-sec');
  selSec.disabled = true;
  selSec.innerHTML = '<option>Carregant…</option>';
  document.getElementById('preview').innerHTML = '';

  status.textContent = `Carregant ${file}…`;
  status.className = 'status';

  try {
    const res = await fetch(BASE + file);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    status.textContent = `✓ ${nom} carregat · ${DATA.length} seccions`;
    status.className = 'status ok';
    populateSections();
  } catch(e) {
    status.textContent = `✗ Municipi no disponible · ${e.message}`;
    status.className = 'status err';
    DATA = [];
  }
}

function populateSections() {
  const sel = document.getElementById('sel-sec');
  sel.innerHTML = '<option value="">— Selecciona secció —</option>';
  DATA.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.cusec;
    opt.textContent = `${s.cusec} · ${s.barri || '—'}`;
    sel.appendChild(opt);
  });
  sel.disabled = false;
  sel.addEventListener('change', () => showPreview(sel.value));
}

function showPreview(cusec) {
  if (!cusec) return;
  const s = DATA.find(x => x.cusec === cusec);
  if (!s) return;

  const ist = s.socioeconomic?.ist?.current ?? '—';
  const trend = s.socioeconomic?.ist?.trend ?? '—';
  const renda = s.socioeconomic?.renda?.per_capita ?? '—';
  const gini = s.socioeconomic?.inequality?.gini?.['2023'] ?? '—';
  const pob = s.demographics?.poblacio ?? '—';
  const edat = s.demographics?.age?.mitjana ?? '—';
  const pct_est = s.demographics?.pct_est ?? '—';
  const pct_esp = s.demographics?.pct_espanyola ?? '—';
  const zona = s.education?.zona_nom ?? '—';
  const fcp_n = s.education?.fcp?.n ?? '—';
  const fcp20 = s.education?.fcp?.clf20 ?? '—';

  document.getElementById('preview').innerHTML = `
    <div class="card">
      <div class="card-t">Identificació</div>
      <div class="kv"><span class="kv-l">CUSEC</span><span class="kv-v">${s.cusec}</span></div>
      <div class="kv"><span class="kv-l">Barri</span><span class="kv-v">${s.barri || '—'}</span></div>
      <div class="kv"><span class="kv-l">Districte</span><span class="kv-v">${s.dc || '—'}</span></div>
      <div class="kv"><span class="kv-l">Zona educativa</span><span class="kv-v">${zona}</span></div>
    </div>
    <div class="card">
      <div class="card-t">Socioeconòmic</div>
      <div class="kv"><span class="kv-l">IST 2024</span><span class="kv-v">${ist} (tendència ${trend})</span></div>
      <div class="kv"><span class="kv-l">Renda neta/càpita 2023</span><span class="kv-v">${renda ? renda.toLocaleString('ca') + ' €' : '—'}</span></div>
      <div class="kv"><span class="kv-l">Gini 2023</span><span class="kv-v">${gini}</span></div>
    </div>
    <div class="card">
      <div class="card-t">Demografia</div>
      <div class="kv"><span class="kv-l">Població 2023</span><span class="kv-v">${pob.toLocaleString('ca')}</span></div>
      <div class="kv"><span class="kv-l">Edat mitjana</span><span class="kv-v">${edat} anys</span></div>
      <div class="kv"><span class="kv-l">% espanyola</span><span class="kv-v">${pct_esp}%</span></div>
      <div class="kv"><span class="kv-l">% estrangera</span><span class="kv-v">${pct_est}%</span></div>
    </div>
    <div class="card">
      <div class="card-t">FCP (Cliff Contact Fraction)</div>
      <div class="kv"><span class="kv-l">Veïns FCP</span><span class="kv-v">${fcp_n}</span></div>
      <div class="kv"><span class="kv-l">FCP20</span><span class="kv-v">${fcp20}%</span></div>
    </div>
  `;
}

init();
</script>
</body>
</html>
