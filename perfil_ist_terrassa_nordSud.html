
<div style="padding: 1rem 0 0.5rem;">
<div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
  <span style="font-size:13px; color:var(--color-text-secondary);">Tall Nord → Sud · zona central (lon 2.003–2.022)</span>
</div>
<div style="position:relative; width:100%; height:220px;">
  <canvas id="perfilNS" role="img" aria-label="Perfil IST Nord-Sud Terrassa zona central, 3.5 km. IST entre 80 i 125, zona rica amb poca variació al centre.">Perfil IST N-S Terrassa: zona central rica IST 110-125, descens cap al nord i sud.</canvas>
</div>
<div style="display:flex; justify-content:space-between; margin-top:4px;">
  <span style="font-size:12px; color:var(--color-text-tertiary);">0 km · Sud</span>
  <span style="font-size:12px; color:var(--color-text-tertiary);">3.55 km · Nord</span>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const distRaw = [0,0.14,0.17,0.23,0.30,0.39,0.42,0.46,0.60,0.78,0.80,0.80,0.85,1.02,1.05,1.08,1.07,1.18,1.21,1.30,1.30,1.44,1.51,1.54,1.71,1.69,1.71,1.82,1.84,1.87,1.95,2.03,2.16,2.29,2.26,2.33,2.29,2.37,2.42,2.37,2.43,2.46,2.51,2.66,2.70,2.70,2.81,2.80,2.86,2.91,2.96,2.99,2.99,3.08,3.29,3.31,3.41,3.51,3.55];
const istRaw = [95.7,87.7,101.9,109.4,116.0,89.3,106.0,97.5,91.2,116.2,105.6,115.5,119.2,119.7,102.7,120.1,117.5,109.2,109.9,120.5,124.5,114.1,116.8,122.4,113.1,110.8,124.1,121.3,122.5,114.7,114.5,123.2,115.6,108.5,108.6,110.0,107.3,105.5,101.1,110.7,106.8,104.2,110.4,88.1,92.9,98.6,88.7,112.5,114.1,112.6,101.6,83.6,104.2,116.0,97.5,114.3,80.6,94.6,114.9];

function smoothArray(arr, w) {
  return arr.map((v,i) => {
    let s=0, c=0;
    for(let j=Math.max(0,i-w); j<=Math.min(arr.length-1,i+w); j++) { s+=arr[j]; c++; }
    return s/c;
  });
}

const N = 200;
const dMax = 3.55;
const distInterp = Array.from({length:N}, (_,i) => i*dMax/(N-1));

function lerp(x, xs, ys) {
  if(x<=xs[0]) return ys[0];
  if(x>=xs[xs.length-1]) return ys[ys.length-1];
  let i = xs.findIndex(v=>v>x)-1;
  const t = (x-xs[i])/(xs[i+1]-xs[i]);
  return ys[i]+t*(ys[i+1]-ys[i]);
}
const istInterp = distInterp.map(d=>lerp(d,distRaw,istRaw));
const istSmooth = smoothArray(smoothArray(istInterp,5),5);

const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const fillColor = isDark ? 'rgba(83,74,183,0.25)' : 'rgba(83,74,183,0.15)';
const lineColor = isDark ? '#AFA9EC' : '#534AB7';
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
const textColor = isDark ? '#aaa' : '#888';

const annotPlugin = {
  id: 'annot',
  afterDraw(chart) {
    const {ctx, scales:{x,y}} = chart;
    const pts = [
      {d: 1.30, label: 'Centre / Eixample', adj: -28},
      {d: 2.16, label: 'Segle XIX', adj: -28},
    ];
    pts.forEach(a => {
      const xi = Math.round(a.d / dMax * (N-1));
      const px = x.getPixelForValue(xi);
      const py = y.getPixelForValue(istSmooth[xi]);
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, 2*Math.PI);
      ctx.fillStyle = lineColor;
      ctx.fill();
      ctx.strokeStyle = isDark ? '#222' : '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = isDark ? '#ddd' : '#333';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(a.label, px, py + a.adj);
      ctx.fillText('IST ' + Math.round(istSmooth[xi]), px, py + a.adj + 13);
      ctx.restore();
    });
    const yIST80 = y.getPixelForValue(80);
    ctx.save();
    ctx.setLineDash([4,4]);
    ctx.strokeStyle = isDark ? 'rgba(200,100,100,0.4)' : 'rgba(180,50,50,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x.left, yIST80);
    ctx.lineTo(x.right, yIST80);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = isDark ? 'rgba(200,100,100,0.6)' : 'rgba(180,50,50,0.5)';
    ctx.font = '10px sans-serif';
    ctx.fillText('IST 80 (llindar CMC)', x.left + 4, yIST80 - 5);
    ctx.restore();
  }
};

new Chart(document.getElementById('perfilNS'), {
  type: 'line',
  data: {
    labels: distInterp.map(d=>d.toFixed(2)),
    datasets: [{
      data: istSmooth,
      borderColor: lineColor,
      borderWidth: 2,
      fill: {target:'origin', above: fillColor},
      pointRadius: 0,
      tension: 0.4,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {display:false},
      tooltip: {
        callbacks: {
          title: ctx => ctx[0].label + ' km',
          label: ctx => 'IST ' + ctx.parsed.y.toFixed(1)
        }
      }
    },
    scales: {
      x: {
        ticks: {
          maxTicksLimit: 7,
          callback: (v,i) => distInterp[i] !== undefined ? distInterp[i].toFixed(1)+' km' : '',
          color: textColor, font: {size:11}
        },
        grid: {color: gridColor}
      },
      y: {
        min: 40, max: 135,
        ticks: {
          stepSize: 20,
          callback: v => 'IST '+v,
          color: textColor, font: {size:11}
        },
        grid: {color: gridColor}
      }
    }
  },
  plugins: [annotPlugin]
});
</script>
