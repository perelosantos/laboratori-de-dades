
<div style="padding: 1rem 0 0.5rem;">
<div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
  <span style="font-size:13px; color:var(--color-text-secondary);">IST 46</span>
  <span style="font-size:13px; font-weight:500; color:var(--color-text-primary);">Tall Oest → Est · Terrassa</span>
  <span style="font-size:13px; color:var(--color-text-secondary);">IST 125</span>
</div>
<div style="position:relative; width:100%; height:220px;">
  <canvas id="perfil" role="img" aria-label="Perfil IST de Terrassa d'Oest a Est, 6.3 km. Valors entre 46 i 125 punts IST. Valls a Ca n'Anglada i barri Segle XX, cim a l'Eixample Nord.">Perfil IST Terrassa Oest-Est: Ca n'Anglada IST≈57, Eixample Nord IST≈125, Segle XX IST≈46.</canvas>
</div>
<div style="display:flex; justify-content:space-between; margin-top:4px;">
  <span style="font-size:12px; color:var(--color-text-tertiary);">0 km · Oest</span>
  <span style="font-size:12px; color:var(--color-text-tertiary);">6.3 km · Est</span>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const distRaw = [0,0.75,0.85,1.12,1.28,1.40,1.40,1.47,1.54,1.53,1.60,1.70,1.82,1.90,2.00,2.10,2.20,2.30,2.40,2.51,2.57,2.61,2.67,2.70,2.73,2.84,2.90,3.00,3.08,3.17,3.25,3.35,3.45,3.54,3.62,3.70,3.80,3.90,4.00,4.10,4.20,4.28,4.29,4.45,4.55,4.80,4.90,5.00,5.10,5.18,5.25,5.33,5.45,5.55,5.65,5.75,5.85,5.95,6.05,6.15,6.24,6.34];
const istRaw = [114.3,88.6,108.7,108.8,87.7,110.7,68.9,56.6,82.0,98.6,103.3,110.1,113.1,114.7,102.0,120.5,104.4,114.5,123.2,124.1,122.4,116.7,122.4,124.5,123.2,121.3,118.9,116.8,122.5,120.1,114.2,111.8,109.5,120.5,112.3,103.2,97.8,89.4,82.1,78.3,72.5,50.6,47.0,46.2,58.9,51.4,62.3,68.7,71.2,73.5,75.8,78.2,80.1,82.4,84.7,86.2,87.5,85.3,83.1,81.9,81.5,80.2];

function smoothArray(arr, w) {
  return arr.map((v,i) => {
    let s=0, c=0;
    for(let j=Math.max(0,i-w); j<=Math.min(arr.length-1,i+w); j++) { s+=arr[j]; c++; }
    return s/c;
  });
}

const N = 200;
const dMax = 6.34;
const distInterp = Array.from({length:N}, (_,i) => i*dMax/(N-1));
function lerp(x, xs, ys) {
  if(x<=xs[0]) return ys[0];
  if(x>=xs[xs.length-1]) return ys[ys.length-1];
  let i = xs.findIndex(v=>v>x)-1;
  const t = (x-xs[i])/(xs[i+1]-xs[i]);
  return ys[i]+t*(ys[i+1]-ys[i]);
}
const istInterp = distInterp.map(d=>lerp(d,distRaw,istRaw));
const istSmooth = smoothArray(smoothArray(istInterp,4),4);

const labels = distInterp.map(d=>d.toFixed(2));

const annotations = [
  {x: 1.47, label: "Ca n'Anglada", ist: 57, yAdj: 18},
  {x: 2.70, label: "Eixample Nord", ist: 124, yAdj: -28},
  {x: 4.45, label: "Segle XX", ist: 46, yAdj: 18},
];

const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const fillColor = isDark ? 'rgba(186,117,23,0.25)' : 'rgba(186,117,23,0.18)';
const lineColor = isDark ? '#EF9F27' : '#BA7517';
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
const textColor = isDark ? '#aaa' : '#888';

const plugin = {
  id: 'annotate',
  afterDraw(chart) {
    const {ctx, scales:{x,y}} = chart;
    annotations.forEach(a => {
      const xi = Math.round(a.x / dMax * (N-1));
      const px = x.getPixelForValue(xi);
      const py = y.getPixelForValue(istSmooth[xi]);
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, 2*Math.PI);
      ctx.fillStyle = lineColor;
      ctx.fill();
      ctx.strokeStyle = isDark ? '#222' : '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = isDark ? '#ddd' : '#333';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(a.label, px, py + a.yAdj);
      ctx.fillStyle = textColor;
      ctx.fillText('IST ' + Math.round(a.ist), px, py + a.yAdj + 13);
      ctx.restore();
    });
    const ctx2 = chart.ctx;
    const yIST80 = y.getPixelForValue(80);
    ctx2.save();
    ctx2.setLineDash([4,4]);
    ctx2.strokeStyle = isDark ? 'rgba(200,100,100,0.4)' : 'rgba(180,50,50,0.3)';
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    ctx2.moveTo(x.left, yIST80);
    ctx2.lineTo(x.right, yIST80);
    ctx2.stroke();
    ctx2.setLineDash([]);
    ctx2.fillStyle = isDark ? 'rgba(200,100,100,0.6)' : 'rgba(180,50,50,0.5)';
    ctx2.font = '10px sans-serif';
    ctx2.fillText('IST 80 (llindar CMC)', x.left + 4, yIST80 - 5);
    ctx2.restore();
  }
};

new Chart(document.getElementById('perfil'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data: istSmooth,
      borderColor: lineColor,
      borderWidth: 2,
      fill: {target:'origin', above: fillColor},
      pointRadius: 0,
      tension: 0.4,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {display: false},
      tooltip: {
        callbacks: {
          title: ctx => ctx[0].label + ' km',
          label: ctx => 'IST ' + ctx.parsed.y.toFixed(1)
        }
      }
    },
    scales: {
      x: {
        ticks: {
          maxTicksLimit: 7,
          callback: (v,i) => distInterp[i] !== undefined ? distInterp[i].toFixed(1)+' km' : '',
          color: textColor,
          font: {size:11}
        },
        grid: {color: gridColor}
      },
      y: {
        min: 40,
        max: 135,
        ticks: {
          stepSize: 20,
          callback: v => 'IST '+v,
          color: textColor,
          font: {size:11}
        },
        grid: {color: gridColor}
      }
    }
  },
  plugins: [plugin]
});
</script>
